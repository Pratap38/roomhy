    <!-- Global FOUC Prevention - Applied to ALL .html-page containers -->
    <style>
      /* Hide all HTML pages by default until CSS is fully processed */
      .html-page {
        opacity: 0;
        transition: opacity 0.1s ease-out;
        will-change: opacity;
      }
      /* Show when CSS is ready */
      .html-page.css-ready {
        opacity: 1;
      }
    </style>
  </head>
