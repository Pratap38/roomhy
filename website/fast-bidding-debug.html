<!DOCTYPE html>
<html>
<head>
    <title>Fast Bidding - Area Dropdown Test</title>
    <script>
        const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:5001'
            : 'https://api.roomhy.com';
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <div class="max-w-md">
        <h1 class="text-2xl font-bold mb-4">Area Dropdown Debug</h1>
        
        <div class="mb-4">
            <label class="block text-sm font-semibold mb-2">Select City</label>
            <select id="city" onchange="loadAreas()">
                <option value="">Loading cities...</option>
            </select>
        </div>
        
        <div class="mb-4">
            <label class="block text-sm font-semibold mb-2">Select Area</label>
            <select id="area">
                <option value="">Select a city first</option>
            </select>
        </div>
        
        <div id="debug" class="bg-gray-100 p-4 rounded mt-4 text-sm whitespace-pre-wrap font-mono"></div>
    </div>

    <script src="assets/js/fast-bidding-debug.js"></script>
</body>
</html>
