<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>API Response Test</h1>
    <div id="output"></div>
    <script>
        fetch('http://localhost:5001/api/approved-properties/public/approved')
            .then(r => r.json())
            .then(data => {
                console.log('API Data:', data);
                document.getElementById('output').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                if (data[0]) {
                    console.log('First property generatedCredentials:', data[0].generatedCredentials);
                    console.log('First property ownerLoginId:', data[0].ownerLoginId);
                    console.log('First property status:', data[0].status);
                }
            })
            .catch(e => {
                console.error('Error:', e);
                document.getElementById('output').innerHTML = 'Error: ' + e.message;
            });
    </script>
</body>
</html>
