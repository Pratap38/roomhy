<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roomhy - Rejected Enquiries</title>
    <script>
        const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:5001' : 'https://api.roomhy.com';
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/enquiry-rejected.css">
</head>
<body class="text-slate-800">
    <div class="flex h-screen overflow-hidden">
        <aside class="sidebar bg-[#111827] w-72 flex-shrink-0 hidden md:flex flex-col">
            <div class="h-16 flex items-center px-6 border-b border-gray-800 sticky top-0 bg-[#111827]"><img src="/website/images/whitelogo.jpeg" alt="Roomhy Logo" class="h-16 w-auto"></div>
            <nav class="flex-1 py-6"><a href="enquiry.html" class="flex items-center px-6 py-3 text-gray-400 hover:text-white transition-all"><i data-lucide="help-circle" class="w-5 h-5 mr-3"></i> Enquiries</a><a href="website.html" class="flex items-center px-6 py-3 text-gray-400 hover:text-white transition-all"><i data-lucide="globe" class="w-5 h-5 mr-3"></i> Live Properties</a></nav>
        </aside>
        <div class="flex-1 flex flex-col">
            <header class="bg-white h-16 shadow-sm flex items-center px-8 border-b border-gray-200">
                <button id="mobile-menu-open" class="md:hidden text-slate-500 mr-2"><i data-lucide="menu" class="w-6 h-6"></i></button>
                <a href="enquiry.html" class="mr-4 text-gray-400 hover:text-purple-600 transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
                <h1 class="text-xl font-bold text-gray-800">Rejected Visits</h1>
            </header>
            <main class="flex-1 p-8">
                <div class="bg-white rounded-xl shadow border overflow-x-auto">
                    <table class="w-full text-left min-w-full">
                        <thead class="bg-gray-50 text-[10px] text-gray-500 uppercase border-b">
                            <tr>
                                <th class="px-6 py-4">Property Name</th>
                                <th class="px-6 py-4">Rejection Reason</th>
                                <th class="px-6 py-4 text-center">Status</th>
                                <th class="px-6 py-4 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="rejectedBody" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>
    <script src="assets/js/enquiry-rejected.js"></script>
        <script src="./mobile-sidebar.js"></script>
</body>
</html>
