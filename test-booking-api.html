<!DOCTYPE html>
<html>
<head>
    <title>Test Booking API</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; }
        button { padding: 10px 20px; margin: 10px 0; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Test Booking API</h1>
    
    <button onclick="testSubmitBooking()">1. Test Submit Booking</button>
    <button onclick="testGetBookings()">2. Fetch All Confirmed Bookings</button>
    <button onclick="testGetLatestBooking()">3. Get Latest Booking Details</button>
    <button onclick="clearResults()">Clear Results</button>

    <div id="results" style="margin-top: 20px;"></div>

    <script>
        const API_URL = 'http://localhost:5001';

        function log(message, isError = false) {
            const results = document.getElementById('results');
            const style = isError ? 'class="error"' : 'class="success"';
            results.innerHTML += `<p ${style}>${new Date().toLocaleTimeString()}: ${message}</p>`;
        }

        async function testSubmitBooking() {
            try {
                log('📤 Submitting test booking...');
                
                const testBookingData = {
                    userId: 'test_user_' + Date.now(),
                    user_id: 'test_user_' + Date.now(),
                    paymentId: 'pay_test_' + Date.now(),
                    payment_id: 'pay_test_' + Date.now(),
                    fullName: 'Test Tenant Name',
                    name: 'Test Tenant Name',
                    phone: '9876543210',
                    email: 'test' + Date.now() + '@example.com',
                    guardianName: 'Test Guardian',
                    guardian_name: 'Test Guardian',
                    guardianPhone: '9876543211',
                    guardian_phone: '9876543211',
                    address_street: 'Test Street 123',
                    address_city: 'Test City',
                    address_state: 'Test State',
                    address_postal_code: '123456',
                    address_country: 'India',
                    propertyId: 'prop_12345',
                    property_id: 'prop_12345',
                    propertyName: 'Test Property',
                    property_name: 'Test Property',
                    ownerId: 'owner_12345',
                    owner_id: 'owner_12345',
                    ownerName: 'Test Owner',
                    owner_name: 'Test Owner',
                    rentAmount: 25000,
                    rent_amount: 25000,
                    area: 'Test Area',
                    propertyType: 'Apartment',
                    property_type: 'Apartment',
                    request_type: 'request',
                    paymentMethod: 'upi',
                    payment_method: 'upi',
                    paymentStatus: 'completed',
                    payment_status: 'completed',
                    paymentAmount: 5000,
                    payment_amount: 5000,
                    status: 'confirmed'
                };

                const response = await fetch(`${API_URL}/api/bookings/confirm`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testBookingData)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`API Error: ${response.status} - ${errorData.message}`);
                }

                const result = await response.json();
                log('✅ Booking submitted successfully!');
                log(`Booking ID: ${result.data._id}`);
                
                // Save ID for later lookup
                window.lastBookingId = result.data._id;
                
                // Show the returned data
                log(`<strong>Response Data:</strong><pre>${JSON.stringify(result.data, null, 2)}</pre>`);
                
            } catch (error) {
                log(`❌ Error submitting booking: ${error.message}`, true);
            }
        }

        async function testGetBookings() {
            try {
                log('📥 Fetching all confirmed bookings...');
                
                const response = await fetch(`${API_URL}/api/booking/requests?status=confirmed`);
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                
                const data = await response.json();
                const bookings = data.data || [];
                
                log(`Found ${bookings.length} confirmed bookings`);
                
                if (bookings.length > 0) {
                    const lastBooking = bookings[bookings.length - 1];
                    log(`<strong>Latest Booking:</strong><pre>${JSON.stringify(lastBooking, null, 2)}</pre>`);
                    
                    // Check which fields are present
                    log('<strong>Fields Analysis:</strong>');
                    log(`✓ Has guardian_name: ${!!lastBooking.guardian_name}`);
                    log(`✓ Has guardian_phone: ${!!lastBooking.guardian_phone}`);
                    log(`✓ Has address_street: ${!!lastBooking.address_street}`);
                    log(`✓ Has address_city: ${!!lastBooking.address_city}`);
                    log(`✓ Has payment_amount: ${!!lastBooking.payment_amount}`);
                    log(`✓ Has payment_method: ${!!lastBooking.payment_method}`);
                    log(`✓ Has payment_status: ${!!lastBooking.payment_status}`);
                }
                
            } catch (error) {
                log(`❌ Error fetching bookings: ${error.message}`, true);
            }
        }

        async function testGetLatestBooking() {
            try {
                if (!window.lastBookingId) {
                    log('⚠️ No booking ID found. Submit a booking first.', true);
                    return;
                }
                
                log(`📥 Fetching booking ${window.lastBookingId}...`);
                
                let response = await fetch(`${API_URL}/api/bookings/${window.lastBookingId}`);
                if (!response.ok) {
                    // Try alternate endpoint
                    response = await fetch(`${API_URL}/api/booking/requests/${window.lastBookingId}`);
                }
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                
                const data = await response.json();
                const booking = data.data;
                
                log(`<strong>Booking Details:</strong><pre>${JSON.stringify(booking, null, 2)}</pre>`);
                
                // Detailed field check
                log('<strong>Detailed Field Check:</strong>');
                const fieldsToCheck = ['guardian_name', 'guardian_phone', 'address_street', 'address_city', 'address_state', 'address_postal_code', 'payment_amount', 'payment_method', 'payment_status', 'bid_amount', 'message', 'request_type'];
                fieldsToCheck.forEach(field => {
                    log(`${field}: ${booking[field] !== undefined ? booking[field] : 'MISSING'}`);
                });
                
            } catch (error) {
                log(`❌ Error fetching booking: ${error.message}`, true);
            }
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
    </script>
</body>
</html>
