<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomHy - Payment Received</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">
    <div class="max-w-2xl mx-auto px-4 py-10">
        <div class="bg-white rounded-xl shadow border border-slate-200 p-6">
            <h1 class="text-2xl font-bold text-slate-900 mb-2">Payment Received</h1>
            <p class="text-sm text-slate-600 mb-6">Confirm cash collection and send OTP to tenant Gmail.</p>

            <div id="statusBox" class="hidden mb-4 rounded-lg px-4 py-3 text-sm"></div>

            <div id="detailsCard" class="space-y-3 text-sm text-slate-700">
                <div><span class="font-semibold">Tenant Name:</span> <span id="tenantName">-</span></div>
                <div><span class="font-semibold">Tenant Login ID:</span> <span id="tenantLoginId">-</span></div>
                <div><span class="font-semibold">Tenant Email:</span> <span id="tenantEmail">-</span></div>
                <div><span class="font-semibold">Property:</span> <span id="propertyName">-</span></div>
                <div><span class="font-semibold">Room Number:</span> <span id="roomNumber">-</span></div>
                <div><span class="font-semibold">Amount:</span> <span id="amount">-</span></div>
                <div><span class="font-semibold">Status:</span> <span id="status">-</span></div>
            </div>

            <button id="receivedBtn" class="mt-6 w-full bg-green-600 text-white font-semibold py-2.5 rounded-lg hover:bg-green-700 disabled:opacity-60 disabled:cursor-not-allowed">
                Payment Received
            </button>
        </div>
    </div>

    <script src="assets/js/payment-received.js"></script>
</body>
</html>
