<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roomhy - Tenant Login</title>
    <script>
        const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:5001'
            : 'https://roomhy-backend-wqwo.onrender.com';
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .light-card { background: #FFFFFF; border-radius: 12px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15); border: 1px solid #e5e7eb; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="light-card w-full max-w-md p-8">
        <div class="text-center mb-8">
            <div class="bg-purple-100 w-12 h-12 rounded-lg flex items-center justify-center mx-auto mb-3">
                <i data-lucide="home" class="w-6 h-6 text-purple-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Roomhy</h1>
            <p class="text-xs text-gray-500 mt-1">TENANT PORTAL</p>
        </div>

        <!-- STEP 1: Verify Temporary Password -->
        <div id="step-1" class="fade-in">
            <h2 class="text-xl font-semibold text-gray-800 mb-1">Welcome, Tenant!</h2>
            <p class="text-sm text-gray-600 mb-6">Enter your login credentials to get started.</p>

            <form onsubmit="event.preventDefault(); verifyTenantTemp();">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Tenant ID</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400"><i data-lucide="user" class="w-5 h-5"></i></span>
                        <input type="text" id="login-id" class="w-full pl-10 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" placeholder="e.g. TNT-KO-001" required>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Temporary Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400"><i data-lucide="key" class="w-5 h-5"></i></span>
                        <input type="password" id="temp-password" class="w-full pl-10 pr-12 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" placeholder="Enter password" required>
                        <button type="button" onclick="togglePasswordVisibility('temp-password', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600" aria-label="Show password">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div class="mt-2 text-right">
                        <button type="button" onclick="openForgotModal()" class="text-sm text-purple-600 hover:text-purple-700 font-medium">Forgot Password?</button>
                    </div>
                </div>

                <button type="submit" class="w-full bg-purple-600 text-white font-bold py-3 rounded-lg hover:bg-purple-700 transition-colors flex justify-center items-center gap-2">
                    Verify <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>

            <p class="text-xs text-gray-500 text-center mt-6">Don't have credentials? <br> Contact your property owner or manager.</p>
        </div>

        <!-- STEP 2: Set New Password -->
        <div id="step-2" class="hidden fade-in">
            <div class="flex justify-center mb-4">
                <div class="bg-green-100 p-3 rounded-full">
                    <i data-lucide="lock" class="w-8 h-8 text-green-600"></i>
                </div>
            </div>
            <h2 class="text-xl font-semibold text-gray-800 mb-1 text-center">Create Your Password</h2>
            <p class="text-sm text-gray-600 mb-6 text-center">Set a secure password for your account.</p>

            <form onsubmit="event.preventDefault(); setTenantPassword();">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
                    <div class="relative">
                        <input type="password" id="new-password" class="w-full p-3 pr-12 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" placeholder="Min. 8 characters" required>
                        <button type="button" onclick="togglePasswordVisibility('new-password', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600" aria-label="Show password">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
                    <div class="relative">
                        <input type="password" id="confirm-password" class="w-full p-3 pr-12 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" placeholder="Confirm password" required>
                        <button type="button" onclick="togglePasswordVisibility('confirm-password', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600" aria-label="Show password">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition-colors flex justify-center items-center gap-2">
                    Continue <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
        </div>

        <!-- Forgot Password Modal -->
        <div id="forgot-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4" onclick="if(event.target.id==='forgot-modal') closeForgotModal()">
            <div class="bg-white w-full max-w-md rounded-xl border border-gray-200 shadow-xl p-6 relative">
                <button type="button" onclick="closeForgotModal()" class="absolute top-3 right-3 text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
                <h2 class="text-xl font-bold text-gray-900 mb-2">Reset Password</h2>
                <p id="forgot-subtitle" class="text-sm text-gray-500 mb-5">Enter your Tenant Login ID</p>

                <div id="forgot-step-1" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Tenant Login ID</label>
                        <input type="text" id="forgot-login-id" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-purple-500 transition-colors" placeholder="e.g. TNT-KO-001">
                    </div>
                    <button type="button" onclick="requestTenantOtp()" class="w-full bg-purple-600 text-white font-semibold py-3 rounded-lg hover:bg-purple-700 transition-colors">Send OTP</button>
                </div>

                <div id="forgot-step-2" class="hidden space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Enter OTP</label>
                        <input type="text" id="forgot-otp" maxlength="6" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-purple-500 transition-colors tracking-widest text-center" placeholder="6-digit OTP">
                    </div>
                    <button type="button" onclick="verifyTenantOtp()" class="w-full bg-purple-600 text-white font-semibold py-3 rounded-lg hover:bg-purple-700 transition-colors">Verify OTP</button>
                </div>

                <div id="forgot-step-3" class="hidden space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
                        <div class="relative">
                            <input type="password" id="forgot-new-password" class="w-full p-3 pr-12 border border-gray-300 rounded-lg focus:ring-purple-500 transition-colors" placeholder="Min 6 characters">
                            <button type="button" onclick="togglePasswordVisibility('forgot-new-password', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                                <i data-lucide="eye" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
                        <div class="relative">
                            <input type="password" id="forgot-confirm-password" class="w-full p-3 pr-12 border border-gray-300 rounded-lg focus:ring-purple-500 transition-colors" placeholder="Re-enter password">
                            <button type="button" onclick="togglePasswordVisibility('forgot-confirm-password', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                                <i data-lucide="eye" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                    <button type="button" onclick="resetTenantPassword()" class="w-full bg-green-600 text-white font-semibold py-3 rounded-lg hover:bg-green-700 transition-colors">Set New Password</button>
                </div>
            </div>
        </div>
        
        <!-- Error Modal -->
        <div id="error-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
            <div class="bg-white rounded-lg shadow-xl max-w-sm p-6">
                <div class="flex items-center gap-3 mb-4">
                    <div class="bg-red-100 p-2 rounded-full">
                        <i data-lucide="alert-circle" class="w-6 h-6 text-red-600"></i>
                    </div>
                    <h3 class="text-lg font-bold text-gray-800">Error</h3>
                </div>
                <p id="error-message" class="text-gray-700 mb-4">An error occurred.</p>
                <button onclick="closeErrorModal()" class="w-full bg-gray-200 text-gray-800 font-medium py-2 rounded-lg hover:bg-gray-300">Dismiss</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let tenantPayload = null;
        let forgotLoginId = '';
        let forgotResetToken = '';

        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            if (!input) return;
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            const icon = btn && btn.querySelector ? btn.querySelector('i') : null;
            if (icon) {
                icon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
                lucide.createIcons();
            }
        }

        function setForgotStep(step) {
            document.getElementById('forgot-step-1')?.classList.toggle('hidden', step !== 1);
            document.getElementById('forgot-step-2')?.classList.toggle('hidden', step !== 2);
            document.getElementById('forgot-step-3')?.classList.toggle('hidden', step !== 3);
            const subtitle = document.getElementById('forgot-subtitle');
            if (!subtitle) return;
            if (step === 1) subtitle.textContent = 'Enter your Tenant Login ID';
            if (step === 2) subtitle.textContent = `OTP sent for ${forgotLoginId}`;
            if (step === 3) subtitle.textContent = 'Set your new password';
        }

        function openForgotModal() {
            const modal = document.getElementById('forgot-modal');
            if (!modal) return;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            const currentLogin = (document.getElementById('login-id')?.value || '').trim().toUpperCase();
            document.getElementById('forgot-login-id').value = currentLogin;
            forgotLoginId = '';
            forgotResetToken = '';
            setForgotStep(1);
            lucide.createIcons();
        }

        function closeForgotModal() {
            const modal = document.getElementById('forgot-modal');
            if (!modal) return;
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            forgotLoginId = '';
            forgotResetToken = '';
        }

        async function requestTenantOtp() {
            const loginId = (document.getElementById('forgot-login-id')?.value || '').trim().toUpperCase();
            if (!loginId) return showError('Please enter Tenant Login ID');
            try {
                const res = await fetch(`${API_URL}/api/auth/tenant/forgot-password/request-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ loginId })
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) return showError(data.message || 'Unable to send OTP');
                forgotLoginId = loginId;
                setForgotStep(2);
                if (data.demo_otp) console.log('[DEV] Tenant OTP:', data.demo_otp);
                alert(data.message || 'OTP sent successfully');
            } catch (e) {
                showError('Network error while sending OTP');
            }
        }

        async function verifyTenantOtp() {
            const otp = (document.getElementById('forgot-otp')?.value || '').trim();
            if (!forgotLoginId) return showError('Please request OTP first');
            if (!otp || otp.length < 6) return showError('Enter valid 6-digit OTP');
            try {
                const res = await fetch(`${API_URL}/api/auth/tenant/forgot-password/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ loginId: forgotLoginId, otp })
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) return showError(data.message || 'Invalid OTP');
                forgotResetToken = data.token || '';
                setForgotStep(3);
            } catch (e) {
                showError('Network error while verifying OTP');
            }
        }

        async function resetTenantPassword() {
            const newPassword = (document.getElementById('forgot-new-password')?.value || '').trim();
            const confirmPassword = (document.getElementById('forgot-confirm-password')?.value || '').trim();
            if (!forgotLoginId || !forgotResetToken) return showError('Please verify OTP first');
            if (newPassword.length < 6) return showError('Password must be at least 6 characters');
            if (newPassword !== confirmPassword) return showError('Passwords do not match');

            try {
                const res = await fetch(`${API_URL}/api/auth/tenant/forgot-password/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ loginId: forgotLoginId, token: forgotResetToken, newPassword })
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) return showError(data.message || 'Failed to reset password');

                const tenants = JSON.parse(localStorage.getItem('roomhy_tenants') || '[]');
                const idx = tenants.findIndex(t => (t.loginId || '').toUpperCase() === forgotLoginId);
                if (idx > -1) {
                    tenants[idx].password = newPassword;
                    tenants[idx].tempPassword = null;
                    tenants[idx].passwordSet = true;
                    localStorage.setItem('roomhy_tenants', JSON.stringify(tenants));
                }

                document.getElementById('login-id').value = forgotLoginId;
                document.getElementById('temp-password').value = newPassword;
                closeForgotModal();
                alert('Password reset successful. Please login.');
            } catch (e) {
                showError('Network error while resetting password');
            }
        }

        // 1. Check if already logged in and redirect based on state
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('tenant_user') || localStorage.getItem('user') || 'null');
            if(user && user.role === 'tenant') {
                // Check progress
                const tenants = JSON.parse(localStorage.getItem('roomhy_tenants') || '[]');
                const me = tenants.find(t => t.loginId === user.loginId);
                if(me) {
                    if(!me.profileFilled) window.location.href = 'tenantprofile.html';
                    else if(me.kycStatus === 'pending') window.location.href = 'tenantkyc.html';
                    else if(!me.agreementSigned) window.location.href = 'tenantagreement.html';
                    else window.location.href = 'tenantdashboard.html';
                }
            }
        });

        // 2. Verify Credentials
        async function verifyTenantTemp() {
            const loginId = document.getElementById('login-id').value.trim().toUpperCase();
            const tempPassword = document.getElementById('temp-password').value.trim();

            // Fallback: Check localStorage (Demo Mode)
            const tenants = JSON.parse(localStorage.getItem('roomhy_tenants') || '[]');
            
            // Active Tenant Login (case-insensitive ID match)
            const activeTenant = tenants.find(t => (t.loginId && t.loginId.toUpperCase() === loginId) && (t.password === tempPassword));
            if(activeTenant) {
                createSession(activeTenant);
                return;
            }

            // First Time Login
            const pendingTenant = tenants.find(t => 
                t.loginId && t.loginId.toUpperCase() === loginId && 
                t.tempPassword === tempPassword &&
                (t.status === 'pending' || !t.passwordSet)
            );

            if (pendingTenant) {
                tenantPayload = pendingTenant;
                showStep2();
            } else {
                showError('Invalid Tenant ID or Password.');
            }
        }

        // 3. Set New Password
        async function setTenantPassword() {
            const newPassword = document.getElementById('new-password').value.trim();
            const confirmPassword = document.getElementById('confirm-password').value.trim();

            if (newPassword.length < 6) return showError('Password must be at least 6 characters.');
            if (newPassword !== confirmPassword) return showError('Passwords do not match.');

            const tenants = JSON.parse(localStorage.getItem('roomhy_tenants') || '[]');
            const idx = tenants.findIndex(t => t.loginId && t.loginId.toUpperCase() === (tenantPayload.loginId || '').toUpperCase());

            if (idx > -1) {
                tenants[idx].password = newPassword;
                tenants[idx].tempPassword = null;
                tenants[idx].passwordSet = true; // Flag for progress
                localStorage.setItem('roomhy_tenants', JSON.stringify(tenants));

                const user = {
                    name: tenants[idx].name,
                    phone: tenants[idx].phone,
                    email: tenants[idx].email,
                    loginId: tenants[idx].loginId,
                    role: 'tenant',
                    tenantId: tenants[idx].id,
                    passwordSet: true
                };
                localStorage.setItem('tenant_user', JSON.stringify(user));

                // Redirect to Step 1 of Onboarding
                alert("Password Set! Proceeding to Profile Setup.");
                window.location.href = 'tenantprofile.html';
            } else {
                showError('System error: Tenant record not found.');
            }
        }
        
        function createSession(tenant) {
            const user = {
                name: tenant.name,
                phone: tenant.phone,
                email: tenant.email,
                loginId: tenant.loginId,
                role: 'tenant',
                tenantId: tenant.id,
                passwordSet: true
            };
            localStorage.setItem('tenant_user', JSON.stringify(user));
            
            // Redirect to where they left off
            if(!tenant.profileFilled) window.location.href = 'tenantprofile.html';
            else if(tenant.kycStatus === 'pending') window.location.href = 'tenantkyc.html';
            else if(!tenant.agreementSigned) window.location.href = 'tenantagreement.html';
            else window.location.href = 'tenantdashboard.html';
        }

        function showStep2() {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        }

        function showError(message) {
            document.getElementById('error-message').innerText = message;
            document.getElementById('error-modal').classList.remove('hidden');
        }
        function closeErrorModal() {
            document.getElementById('error-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
