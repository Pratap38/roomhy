<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomHy - Staff Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Suppress Tailwind CDN production warning in development
        const originalWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && args[0].includes('cdn.tailwindcss.com should not be used in production')) {
                return; // Suppress this specific warning
            }
            originalWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        // API Configuration
        const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:5000'
            : 'https://roomhy-backend.onrender.com';
    </script>
    <script src="seeder.js"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #1F2937;
            min-height: 100vh;
        }
        .card-light { 
            background: #FFFFFF; 
            border-radius: 16px; 
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid #e5e7eb;
        }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .btn-primary { background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%); cursor: pointer; }
        .btn-primary:hover { background: linear-gradient(135deg, #4338ca 0%, #3730a3 100%); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
        .error-msg { color: #dc2626; font-size: 0.875rem; margin-top: 0.5rem; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="card-light w-full max-w-md p-8" id="login-container">
        <div class="text-center mb-8">
            <a href="website/index.html" class="inline-flex items-center justify-center mb-4">
                <img src="https://res.cloudinary.com/dpwgvcibj/image/upload/v1768990260/roomhy/website/logoroomhy.png" alt="Roomhy Logo" class="h-10 w-auto">
            </a>
            <h1 class="text-3xl font-bold text-gray-900 mb-1">Staff Login</h1>
            <p class="text-gray-500 text-sm">Enter your credentials to access Roomhy</p>
        </div>

        <!-- Unified Login Form -->
        <div id="login-form" class="fade-in">
            <form onsubmit="event.preventDefault(); handleUnifiedLogin();">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Login ID</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"><i data-lucide="user" class="w-5 h-5"></i></span>
                        <input 
                            type="text" 
                            class="input-focus w-full pl-10 p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 transition-colors outline-none" 
                            id="login-id" 
                            placeholder="Enter your ID..." 
                            required
                            autocomplete="off"
                        >
                    </div>
                    <p class="text-xs text-gray-400 mt-1">Email, ID code, or account number</p>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"><i data-lucide="lock" class="w-5 h-5"></i></span>
                        <input 
                            type="password" 
                            class="input-focus w-full pl-10 p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 transition-colors outline-none" 
                            id="login-password" 
                            placeholder=""¢"¢"¢"¢"¢"¢"¢"¢" 
                            required
                            autocomplete="off"
                        >
                    </div>
                    <div id="error-msg" class="error-msg hidden"></div>
                </div>

                <button type="submit" class="btn-primary w-full text-white font-bold py-3 rounded-lg transition-all flex justify-center items-center gap-2">
                    Login <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
            
            <div class="mt-6 text-center border-t border-gray-100 pt-4">
                <p class="text-sm text-gray-500">Don't have credentials yet?</p>
                <a href="owner-login.html" class="text-sm font-medium text-indigo-600 hover:text-indigo-800">Request access or sign up</a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // Unified Login Handler - Auto-detects user role by ID (optimized for speed)
        function handleUnifiedLogin() {
            const loginId = document.getElementById('login-id').value.trim();
            const password = document.getElementById('login-password').value.trim();
            const errorMsg = document.getElementById('error-msg');
            errorMsg.classList.add('hidden');

            console.log('[Login] Starting login process for ID:', loginId);

            if (!loginId || !password) {
                showError('Please fill in all fields.', errorMsg);
                return;
            }

            // Clear previous sessions
            sessionStorage.removeItem('manager_user');
            sessionStorage.removeItem('user');
            sessionStorage.removeItem('owner_session');

            const up = loginId.toUpperCase();

            // Priority 1: Check databases first (supports old and new IDs)
            // This ensures old IDs are found before format-based routing
            
            // Check Area Managers DB
            try {
                const mgrs = JSON.parse(localStorage.getItem('roomhy_areamanagers_db') || '[]');
                if (Array.isArray(mgrs) && mgrs.find(m => (m.loginId || '').toUpperCase() === up)) {
                    console.log('[Login] Found in Area Managers DB');
                    loginAreaManager(loginId, password, errorMsg);
                    return;
                }
            } catch (e) {
                console.warn('Could not parse roomhy_areamanagers_db', e);
            }

            // Check Employees DB
            try {
                const emps = JSON.parse(localStorage.getItem('roomhy_employees') || '[]');
                if (Array.isArray(emps) && emps.find(e => (e.loginId || '').toUpperCase() === up)) {
                    console.log('[Login] Found in Employees DB');
                    loginEmployee(loginId, password, errorMsg);
                    return;
                }
            } catch (e) {
                console.warn('Could not parse roomhy_employees', e);
            }

            // Check Owners DB (object keyed by ownerId)
            try {
                const owners = JSON.parse(localStorage.getItem('roomhy_owners_db') || '{}');
                if (owners && (owners[loginId] || owners[up])) {
                    console.log('[Login] Found in Owners DB');
                    loginOwner(loginId, password, errorMsg);
                    return;
                }
            } catch (e) {
                console.warn('Could not parse roomhy_owners_db', e);
            }

            // Priority 2: Format-based detection for new IDs or non-database matches
            console.log('[Login] Using format-based detection for ID:', loginId);
            if (loginId.includes('@')) {
                // Email format - try SuperAdmin
                console.log('[Login] Detected SuperAdmin (email format)');
                loginSuperAdmin(loginId, password, errorMsg);
                return;
            } else if (up.startsWith('ROOMHY')) {
                // Owner ID format
                console.log('[Login] Detected Owner (ROOMHY prefix)');
                loginOwner(loginId, password, errorMsg);
                return;
            } else if (up.startsWith('MGR')) {
                // Area Manager format
                console.log('[Login] Detected Area Manager (MGR prefix)');
                loginAreaManager(loginId, password, errorMsg);
                return;
            } else if (up.startsWith('RY') || up.startsWith('EMP')) {
                // Employee format (RY prefix or generic EMP)
                console.log('[Login] Detected Employee (RY/EMP prefix)');
                loginEmployee(loginId, password, errorMsg);
                return;
            }

            // If no match found anywhere
            console.error('[Login] Could not detect user type for ID:', loginId);
            showError('Login ID format not recognized.', errorMsg);
        }

        // SuperAdmin Login with optimized speed - try local first, then backend
        async function loginSuperAdmin(email, password, errorMsg) {
            console.log('[Login] Attempting SuperAdmin login with email:', email);
            
            // Try local login first (instant) - this is the primary path
            const db = JSON.parse(localStorage.getItem('roomhy_superadmin_db') || 'null');
            
            // Check hardcoded default credentials first (fastest)
            if (!db && email === 'roomhyadmin@gmail.com' && password === 'admin@123') {
                console.log('[Login] ✅ SuperAdmin login with default credentials');
                const user = { id: 'SUPER_ADMIN', loginId: 'SUPER_ADMIN', email, name: 'Super Admin', role: 'superadmin' };
                sessionStorage.setItem('user', JSON.stringify(user));
                localStorage.setItem('user', JSON.stringify(user));
                window.location.href = 'superadmin/superadmin.html';
                return;
            }

            // Check local database (stored by seeder)
            if (db && db.email === email && db.password === password) {
                console.log('[Login] ✅ SuperAdmin login with stored credentials');
                const user = { ...db, loginId: db.loginId || db.id || 'SUPER_ADMIN', role: 'superadmin' };
                sessionStorage.setItem('user', JSON.stringify(user));
                localStorage.setItem('user', JSON.stringify(user));
                window.location.href = 'superadmin/superadmin.html';
                return;
            }

            console.log('[Login] Local SuperAdmin credentials not found, trying backend API...');

            // If local login failed, try backend API with timeout (5 seconds max)
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000); // 5 second timeout
                
                const response = await fetch(API_URL + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier: email, password }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (response.ok) {
                    const data = await response.json();
                    if (data.token && data.user) {
                        console.log('[Login] ✅ SuperAdmin login via backend API');
                        // Store user and token from backend
                        localStorage.setItem('user', JSON.stringify(data.user));
                        localStorage.setItem('token', data.token);
                        sessionStorage.setItem('token', data.token);
                        window.location.href = 'superadmin/superadmin.html';
                        return;
                    }
                }
            } catch (err) {
                console.warn('[Login] Backend API unavailable or slow:', err.message);
                // Continue to show invalid credentials error
            }

            // If both local and backend failed
            console.warn('[Login] SuperAdmin login failed - Invalid credentials');
            showError('Invalid credentials.', errorMsg);
        }

        // Owner Login
        function loginOwner(ownerId, password, errorMsg) {
            console.log('[Login] Searching for Owner with ID:', ownerId);
            
            const db = JSON.parse(localStorage.getItem('roomhy_owners_db') || '{}');
            // Try direct lookup first, then case-insensitive search
            let owner = db[ownerId];
            if (!owner) {
                // Case-insensitive search
                const ownerKey = Object.keys(db).find(key => key.toUpperCase() === ownerId.toUpperCase());
                owner = ownerKey ? db[ownerKey] : null;
            }

            if (!owner) {
                console.warn('[Login] Owner not found with ID:', ownerId);
                return showError('ID not found.', errorMsg);
            }

            const storedPass = owner.credentials?.password || owner.password;
            
            if (storedPass === password) {
                // Check if first time setup is needed
                if (owner.credentials?.firstTime || !owner.passwordSet) {
                    console.warn('[Login] Owner found but first-time password setup required:', ownerId);
                    showError('Please use the separate portal to set your password.', errorMsg);
                    return;
                }

                console.log('[Login] ✅ Owner login successful:', ownerId);
                // Successful login - set sessionStorage ONLY (do not clear shared localStorage to avoid cross-tab logout)
                const sessionUser = { 
                    loginId: ownerId, 
                    role: 'owner', 
                    ownerId: ownerId, 
                    name: owner.profile?.name || 'Owner' 
                };
                sessionStorage.setItem('owner_session', JSON.stringify(sessionUser));
                window.location.href = 'propertyowner/admin.html';
            } else {
                console.warn('[Login] Owner credentials invalid for:', ownerId);
                showError('Invalid credentials.', errorMsg);
            }
        }

        // Area Manager Login  
        function loginAreaManager(loginId, password, errorMsg) {
            const db = JSON.parse(localStorage.getItem('roomhy_areamanagers_db') || '[]');
            console.log('[Login] Searching for Area Manager with ID:', loginId);
            console.log('[Login] Total area managers in storage:', db.length);
            
            const mgr = db.find(m => (m.loginId || '').toUpperCase() === loginId.toUpperCase() && m.password === password);
            if (mgr) {
                console.log('[Login] ✅ Area Manager login successful:', loginId);
                const user = { ...mgr, role: 'areamanager' };
                user.areaCode = user.areaCode || user.area || user.areaName || '';
                user.areaName = user.areaName || user.area || '';
                // Set in both storages for cross-environment compatibility
                sessionStorage.setItem('manager_user', JSON.stringify(user));
                sessionStorage.setItem('user', JSON.stringify(user));
                localStorage.setItem('manager_user', JSON.stringify(user));
                localStorage.setItem('user', JSON.stringify(user));
                window.location.href = 'Areamanager/areaadmin.html';
            } else {
                console.warn('[Login] Area Manager not found or password mismatch for:', loginId);
                showError('Invalid credentials.', errorMsg);
            }
        }

        // Employee Login with detailed logging
        function loginEmployee(loginId, password, errorMsg) {
             const employees = JSON.parse(localStorage.getItem('roomhy_employees') || '[]');
             console.log('[Login] Searching for employee with ID:', loginId);
             console.log('[Login] Total employees in storage:', employees.length);
             
             const emp = employees.find(e => {
                 const storedId = (e.loginId || '').toUpperCase();
                 const inputId = loginId.toUpperCase();
                 const passwordMatch = e.password === password;
                 
                 if (storedId === inputId) {
                     console.log('[Login] Found matching loginId:', storedId);
                     console.log('[Login] Password in storage:', e.password ? '***' + e.password.slice(-3) : 'EMPTY');
                     console.log('[Login] Password entered:', password ? '***' + password.slice(-3) : 'EMPTY');
                     console.log('[Login] Password match:', passwordMatch);
                 }
                 return storedId === inputId && passwordMatch;
             });

             if (!emp) {
                 console.warn('[Login] Employee not found or password mismatch for:', loginId);
                 showError('Invalid credentials.', errorMsg);
                 return;
             }

             console.log('[Login] ✅ Employee login successful:', loginId);

             const user = {
                 loginId: emp.loginId,
                 name: emp.name,
                 role: 'employee',
                 team: emp.team || emp.role || 'Employee',
                 permissions: emp.permissions || [],
                 location: emp.location || emp.area || emp.areaName || '',
                 area: emp.area || emp.areaName || '',
                 areaName: emp.areaName || emp.area || '',
                 areaCode: emp.areaCode || ''
             };

             // Set in both storages for cross-environment compatibility
             sessionStorage.setItem('manager_user', JSON.stringify(user));
             sessionStorage.setItem('user', JSON.stringify(user));
             localStorage.setItem('manager_user', JSON.stringify(user));
             localStorage.setItem('user', JSON.stringify(user));
             window.location.href = 'Areamanager/areaadmin.html';
        }

        function showError(msg, errorMsg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }
    </script>
</body>
</html>
