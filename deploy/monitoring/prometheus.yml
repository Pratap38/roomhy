# Prometheus Configuration
# Defines scrape jobs, alerting rules, and global settings

global:
  scrape_interval: 15s              # How often to scrape targets
  scrape_timeout: 10s               # Timeout for scrapes
  evaluation_interval: 15s          # How often to evaluate rules
  external_labels:
    environment: 'production'
    service: 'roomhy'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Alert rules
rule_files:
  - '/etc/prometheus/alerting-rules.yml'

# Scrape configs
scrape_configs:
  # ========================================================================
  # Prometheus itself
  # ========================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s
    scrape_timeout: 10s

  # ========================================================================
  # Roomhy Backend API
  # ========================================================================
  - job_name: 'roomhy-backend'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['host.docker.internal:5001']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
    # Service discovery (optional - uncomment if using K8s)
    # kubernetes_sd_configs:
    #   - role: pod
    #     namespaces:
    #       names: ['roomhy']

  # ========================================================================
  # Node Exporter (Server Metrics)
  # ========================================================================
  - job_name: 'node-exporter'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # ========================================================================
  # MongoDB (if using Prometheus MongoDB exporter)
  # Requires: docker run -d --name mongo-exporter -p 9216:9216 percona/mongodb_exporter
  # ========================================================================
  # - job_name: 'mongodb'
  #   scrape_interval: 30s
  #   static_configs:
  #     - targets: ['localhost:9216']
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: instance

  # ========================================================================
  # Redis (if using Redis for caching)
  # Requires: docker run -d --name redis-exporter -p 9121:9121 oliver006/redis_exporter
  # ========================================================================
  # - job_name: 'redis'
  #   scrape_interval: 30s
  #   static_configs:
  #     - targets: ['localhost:9121']

  # ========================================================================
  # Nginx (if using Nginx reverse proxy)
  # Requires: nginx with prometheus module
  # ========================================================================
  # - job_name: 'nginx'
  #   scrape_interval: 30s
  #   static_configs:
  #     - targets: ['localhost:9113']

  # ========================================================================
  # Docker Stats (Container monitoring)
  # Requires: cAdvisor - docker run -d --name cadvisor -p 8080:8080 \
  #           -v /:/rootfs:ro -v /var/run:/var/run:ro \
  #           -v /sys:/sys:ro -v /var/lib/docker/:/var/lib/docker:ro \
  #           gcr.io/cadvisor/cadvisor:latest
  # ========================================================================
  # - job_name: 'docker'
  #   scrape_interval: 30s
  #   static_configs:
  #     - targets: ['localhost:8080']

# ============================================================================
# Remote Storage (Optional - for long-term storage)
# Useful for storing metrics beyond Prometheus retention period
# ============================================================================
# remote_write:
#   - url: "http://localhost:9009/api/v1/push"  # VictoriaMetrics
#     queue_config:
#       capacity: 10000
#       max_shards: 200
#       min_shards: 1
#       max_samples_per_send: 1000
#       batch_send_wait: 5s
#       min_backoff: 30ms
#       max_backoff: 100ms

# ============================================================================
# Notes:
# - Adjust targets to match your infrastructure
# - For cloud deployments (AWS, GCP, Azure), use service discovery configs
# - Consider adding AWS/Azure monitoring exporters
# - For Kubernetes, replace static_configs with kubernetes_sd_configs
# ============================================================================
