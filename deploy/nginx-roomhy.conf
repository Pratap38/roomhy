# roomhy.com multi-subdomain routing
# Update filesystem paths and SSL directives based on your VPS setup.

upstream roomhy_backend {
    server 127.0.0.1:5001;
}

server {
    listen 80;
    server_name roomhy.com www.roomhy.com;

    root /var/www/roomhy/website;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name admin.roomhy.com;

    root /var/www/roomhy;
    index superadmin/index.html;

    location = / {
        return 302 /superadmin/index.html;
    }

    location /superadmin/ {
        try_files $uri $uri/ =404;
    }

    location /digital-checkin/ {
        try_files $uri $uri/ =404;
    }

    location /website/js/ {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    server_name app.roomhy.com;

    root /var/www/roomhy;
    index propertyowner/index.html;

    location = / {
        return 302 /propertyowner/index.html;
    }

    location /propertyowner/ {
        try_files $uri $uri/ =404;
    }

    location /tenant/ {
        try_files $uri $uri/ =404;
    }

    location /js/ {
        try_files $uri $uri/ =404;
    }

    location /booking-form.html {
        try_files $uri =404;
    }
}

server {
    listen 80;
    server_name api.roomhy.com;

    location /socket.io/ {
        proxy_pass http://roomhy_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://roomhy_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
