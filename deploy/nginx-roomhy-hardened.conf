# Hardened Nginx reference config for Roomhy
# Place inside /etc/nginx/sites-available/roomhy.conf and adjust SSL blocks as needed.

limit_req_zone $binary_remote_addr zone=api_rate:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_rate:10m rate=8r/m;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream roomhy_backend {
    least_conn;
    server 127.0.0.1:5001 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

map $request_uri $is_auth_path {
    default 0;
    ~^/api/auth/ 1;
}

server {
    listen 80;
    server_name roomhy.com www.roomhy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name admin.roomhy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name app.roomhy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name api.roomhy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.roomhy.com;

    # ssl_certificate /etc/letsencrypt/live/roomhy.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/roomhy.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    limit_conn conn_per_ip 40;
    limit_req zone=api_rate burst=60 nodelay;

    location /api/auth/ {
        limit_req zone=auth_rate burst=12 nodelay;
        proxy_pass http://roomhy_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://roomhy_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://roomhy_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
