<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenant Digital Check-In - KYC</title>
  <link rel="stylesheet" href="assets/css/tenantkyc.css">
</head>
<body>
  <div class="wrap">
    <h2>Tenant Aadhaar KYC</h2>
    <div class="grid">
      <div><label>Login ID</label><input id="loginId" required></div>
      <div><label>Aadhaar Number</label><input id="aadhaarNumber" pattern="\d{12}" maxlength="12" required></div>
      <div><label>Aadhaar Linked Phone Number</label><input id="aadhaarLinkedPhone" required></div>
      <div><label>OTP (6 digits)</label><input id="otp" pattern="\d{6}" maxlength="6"></div>
      <div class="full"><label>Aadhaar Front Photo</label><input id="aadhaarFront" type="file" accept="image/*" required></div>
      <div class="full"><label>Aadhaar Back Photo</label><input id="aadhaarBack" type="file" accept="image/*" required></div>
    </div>
    <button id="sendOtpBtn">Send OTP</button>
    <button id="verifyOtpBtn">Verify OTP</button>
    <p class="muted" id="otpMsg"></p>
    <button id="nextBtn" style="display:none;">Continue to Rental Agreement</button>
  </div>

  <script src="assets/js/tenantkyc.js"></script>
</body>
</html>
