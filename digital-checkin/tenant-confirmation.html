<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoomHy - Submission Complete</title>
  <style>
    :root {
      --bg-a: #ecfdf5;
      --bg-b: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --ok: #16a34a;
      --btn: #0f172a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, var(--bg-a), var(--bg-b));
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border-radius: 14px;
      padding: 26px 24px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 0 auto 14px;
      background: #dcfce7;
      color: var(--ok);
      font-size: 32px;
      font-weight: 700;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.2;
    }
    p {
      margin: 0;
      font-size: 16px;
      color: var(--muted);
      line-height: 1.6;
    }
    .meta {
      margin: 16px 0 18px;
      font-size: 13px;
      color: #64748b;
    }
    .btn {
      display: inline-block;
      text-decoration: none;
      background: var(--btn);
      color: #fff;
      border-radius: 9px;
      padding: 11px 16px;
      font-weight: 700;
      border: 0;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Welcome to RoomHy</h1>
    <p>Your tenant agreement has been submitted successfully.</p>
    <p>We have sent the login link to your registered Gmail.</p>
    <div class="meta" id="redirectText">Redirecting to login page in 5 seconds...</div>
    <a class="btn" id="continueBtn" href="../propertyowner/index.html">Go to Tenant Login Now</a>
  </div>

  <script>
    const nextUrl = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:5001/propertyowner/index.html'
      : 'https://app.roomhy.com/propertyowner/index.html';
    const continueBtn = document.getElementById('continueBtn');
    continueBtn.href = nextUrl;

    setTimeout(() => {
      try {
        window.location.replace(nextUrl);
      } catch (_) {
        window.location.href = nextUrl;
      }
    }, 5000);
  </script>
</body>
</html>
