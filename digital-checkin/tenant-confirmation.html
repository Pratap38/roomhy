<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoomHy - Submission Complete</title>
  <link rel="stylesheet" href="assets/css/tenant-confirmation.css">
</head>
<body>
  <div class="card">
    <div class="icon">&#10003;</div>
    <h1>Welcome to RoomHy</h1>
    <p>Your tenant agreement has been submitted successfully.</p>
    <p>We have sent the login link to your registered Gmail.</p>
    <div class="meta" id="redirectText">Redirecting to login page in 5 seconds...</div>
    <a class="btn" id="continueBtn" href="../tenant/tenantlogin.html">Go to Tenant Login Now</a>
  </div>

  <script>
    const nextUrl = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:5001/tenant/tenantlogin.html'
      : 'https://app.roomhy.com/tenant/tenantlogin.html';
    const continueBtn = document.getElementById('continueBtn');
    continueBtn.href = nextUrl;

    setTimeout(() => {
      try {
        window.location.replace(nextUrl);
      } catch (_) {
        window.location.href = nextUrl;
      }
    }, 5000);
  </script>
</body>
</html>
