<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Digital Check-In - Profile</title>
  <link rel="stylesheet" href="assets/css/ownerprofile.css">
</head>
<body>
  <div class="wrap">
    <h1>Owner Check-In Profile</h1>
    <p>Fill owner details exactly as shared during onboarding.</p>
    
    <!-- Display Auto-Fetched Values -->
    <div id="autoFetchedInfo" style="background: #e3f2fd; border: 1px solid #2196f3; border-radius: 8px; padding: 12px; margin-bottom: 16px; display: none;">
      <p style="margin: 0 0 8px; font-weight: bold; color: #1976d2;">Auto-Fetched Information:</p>
      <div style="font-size: 13px; color: #555;">
        <p style="margin: 4px 0;"><strong>Email:</strong> <span id="autoEmail">-</span></p>
        <p style="margin: 4px 0;"><strong>Area:</strong> <span id="autoArea">-</span></p>
        <p style="margin: 4px 0;"><strong>Password:</strong> <span id="autoPassword" style="font-family: monospace;">-</span></p>
      </div>
    </div>

    <form id="ownerProfileForm">
      <div class="grid">
        <div>
          <label>Login ID (given in message)</label>
          <input id="loginId" required>
        </div>
        <div>
          <label>Name</label>
          <input id="name" required>
        </div>
        <div>
          <label>Gmail</label>
          <input id="email" type="email" required>
        </div>
        <div>
          <label>Area</label>
          <input id="area" required>
        </div>
        <div>
          <label>Date of Birth</label>
          <input id="dob" type="date" required>
        </div>
        <div>
          <label>Phone Number</label>
          <input id="phone" type="tel" required>
        </div>
        <div>
          <label>Address</label>
          <input id="address" required>
        </div>
        <div>
          <label>Bank Name</label>
          <input id="bankName" required>
        </div>
        <div>
          <label>Branch Name</label>
          <input id="branchName" required>
        </div>
        <div>
          <label>Bank Account Number</label>
          <input id="bankAccountNumber" required>
        </div>
        <div>
          <label>IFSC Code</label>
          <input id="ifscCode" required>
        </div>
        <div>
          <label>Account Holder Name</label>
          <input id="accountHolderName" required>
        </div>
        <div>
          <label>UPI ID (optional)</label>
          <input id="upiId">
        </div>
      </div>
      <button type="submit">Save & Continue to Owner KYC</button>
    </form>
  </div>

  <script src="assets/js/ownerprofile.js"></script>
</body>
</html>
