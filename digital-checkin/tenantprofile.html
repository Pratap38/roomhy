<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenant Digital Check-In - Profile</title>
  <link rel="stylesheet" href="assets/css/tenantprofile.css">
</head>
<body>
  <div class="wrap">
    <h2>Tenant Profile</h2>
    <form id="tenantProfileForm">
      <div class="grid">
        <div><label>Login ID</label><input id="loginId" required></div>
        <div><label>Name</label><input id="name" required></div>
        <div><label>Property Name</label><input id="propertyName" readonly></div>
        <div><label>Room Number</label><input id="roomNo" readonly></div>
        <div><label>Agreed Rent</label><input id="agreedRent" readonly></div>
        <div><label>Date of Birth</label><input id="dob" type="date" required></div>
        <div><label>Guardian Number</label><input id="guardianNumber" required></div>
        <div><label>Date of Move In</label><input id="moveInDate" type="date" required></div>
        <div><label>Email</label><input id="email" type="email"></div>
      </div>
      <button type="submit">Save & Continue to Tenant KYC</button>
    </form>
  </div>

  <script src="assets/js/tenantprofile.js"></script>
</body>
</html>
