<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Digital Check-In - KYC</title>
  <link rel="stylesheet" href="assets/css/ownerkyc.css">
</head>
<body>
  <div class="wrap">
    <h2>Owner Aadhaar KYC</h2>
    <p class="muted">Verify your identity using Aadhaar for secure access.</p>
    
    <!-- Display Email Info -->
    <div id="emailInfo" style="background: #e3f2fd; border: 1px solid #2196f3; border-radius: 8px; padding: 12px; margin-bottom: 16px; display: none;">
      <p style="margin: 0; font-size: 12px; color: #1976d2;"><strong>Registered email for login details:</strong> <span id="displayEmail">-</span></p>
    </div>
    
    <div class="grid">
      <div>
        <label>Login ID</label>
        <input id="loginId" readonly>
      </div>
      <div>
        <label>Mobile Number (linked with Aadhaar)</label>
        <input id="aadhaarLinkedPhone" type="text" placeholder="10-digit mobile like 9876543210" required>
        <div class="hint">Enter the 10-digit mobile number linked to your Aadhaar</div>
      </div>
      <div>
        <label>Aadhaar Number</label>
        <input id="aadhaarNumber" type="text" placeholder="XXXX XXXX XXXX" pattern="\d{4}[\s]?\d{4}[\s]?\d{4}" required>
        <div class="hint">Format: XXXX XXXX XXXX (12 digits, spaces optional)</div>
      </div>
      <div>
        <label>OTP (6 digits)</label>
        <input id="otp" type="text" placeholder="000000" pattern="\d{6}" maxlength="6" required>
        <div class="hint">6-digit OTP sent to your Aadhaar linked mobile number</div>
      </div>
    </div>
    <button id="sendOtpBtn">Send OTP to Aadhaar Mobile</button>
    <button id="verifyOtpBtn" type="button">Verify OTP</button>
    <p class="muted" id="otpMsg"></p>
    <button id="nextBtn" type="button" style="display:none;">Continue to Terms & Conditions</button>
  </div>

  <script src="assets/js/ownerkyc.js"></script>
</body>
</html>
