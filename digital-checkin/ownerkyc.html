<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Digital Check-In - KYC</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6fb; margin: 0; }
    .wrap { max-width: 760px; margin: 30px auto; background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { font-size: 13px; font-weight: 700; display: block; margin-bottom: 6px; }
    input { width: 100%; padding: 10px; border: 1px solid #ccd2e0; border-radius: 8px; box-sizing: border-box; }
    button { margin-top: 14px; background: #1f4fd6; color: #fff; border: 0; border-radius: 8px; padding: 11px 16px; cursor: pointer; font-weight: 700; margin-right: 8px; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .muted { color: #666; font-size: 12px; }
    .hint { color: #999; font-size: 11px; margin-top: 4px; }
    .success { color: #4caf50; font-weight: bold; }
    .error { color: #d32f2f; font-weight: bold; }
    @media (max-width: 760px){ .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Owner Aadhaar KYC</h2>
    <p class="muted">Verify your identity using Aadhaar for secure access.</p>
    
    <!-- Display Email Info -->
    <div id="emailInfo" style="background: #e3f2fd; border: 1px solid #2196f3; border-radius: 8px; padding: 12px; margin-bottom: 16px; display: none;">
      <p style="margin: 0; font-size: 12px; color: #1976d2;"><strong>OTP will be sent to:</strong> <span id="displayEmail">-</span></p>
    </div>
    
    <div class="grid">
      <div>
        <label>Login ID</label>
        <input id="loginId" readonly>
      </div>
      <div>
        <label>Mobile Number (linked with Aadhaar)</label>
        <input id="aadhaarLinkedPhone" type="text" placeholder="10-digit mobile like 9876543210" required>
        <div class="hint">Enter the 10-digit mobile number linked to your Aadhaar</div>
      </div>
      <div>
        <label>Aadhaar Number</label>
        <input id="aadhaarNumber" type="text" placeholder="XXXX XXXX XXXX XXXX" pattern="\d{4}[\s]?\d{4}[\s]?\d{4}[\s]?\d{4}" required>
        <div class="hint">Format: XXXX XXXX XXXX XXXX (12 digits, spaces optional)</div>
      </div>
      <div>
        <label>OTP (4 digits)</label>
        <input id="otp" type="text" placeholder="0000" pattern="\d{4}" maxlength="4" required>
        <div class="hint">4-digit OTP sent to your registered email</div>
      </div>
    </div>
    <button id="sendOtpBtn">Send OTP to Email</button>
    <button id="verifyOtpBtn" type="button">Verify OTP</button>
    <p class="muted" id="otpMsg"></p>
    <button id="nextBtn" type="button" style="display:none;">Continue to Terms & Conditions</button>
  </div>

  <script>
    const API_BASES = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? ['http://localhost:5001', 'http://localhost:5000']
      : ['https://roomhy-backend-wqwo.onrender.com'];
    const params = new URLSearchParams(location.search);
    if (params.get('loginId')) document.getElementById('loginId').value = params.get('loginId');
    const ownerEmail = (params.get('email') || '').trim();
    
    // Display email info if available
    if (ownerEmail) {
      document.getElementById('emailInfo').style.display = 'block';
      document.getElementById('displayEmail').textContent = ownerEmail;
      console.log('OTP will be sent to:', ownerEmail);
    } else {
      console.warn('No email found in URL parameter');
    }

    // Format Aadhaar number as user types
    document.getElementById('aadhaarNumber').addEventListener('input', (e) => {
      let val = e.target.value.replace(/\D/g, ''); // Remove non-digits
      if (val.length > 12) val = val.substring(0, 12); // Limit to 12 digits
      // Format with spaces: XXXX XXXX XXXX
      if (val.length > 8) val = val.substring(0, 4) + ' ' + val.substring(4, 8) + ' ' + val.substring(8);
      else if (val.length > 4) val = val.substring(0, 4) + ' ' + val.substring(4);
      e.target.value = val;
      console.log('Formatted Aadhaar:', val, 'digits only:', val.replace(/\s/g, ''));
    });

    async function postWithFallback(path, payload) {
      let lastErr = null;
      for (const base of API_BASES) {
        try {
          const res = await fetch(`${base}${path}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (res.ok) return res.json();
          const data = await res.json().catch(() => ({}));
          lastErr = new Error(data.message || `HTTP ${res.status}`);
        } catch (err) {
          lastErr = err;
        }
      }
      throw lastErr || new Error('Request failed');
    }

    document.getElementById('sendOtpBtn').onclick = async () => {
      const loginId = document.getElementById('loginId').value.trim();
      const aadhaarLinkedPhone = document.getElementById('aadhaarLinkedPhone').value.trim();
      const aadhaarNumber = document.getElementById('aadhaarNumber').value.trim().replace(/\s/g, '');
      
      if (!loginId) {
        return alert('Login ID is missing. Please check the URL.');
      }
      if (!aadhaarLinkedPhone) {
        return alert('Please enter your mobile number linked with Aadhaar');
      }
      if (!aadhaarNumber) {
        return alert('Please enter your Aadhaar number');
      }
      if (aadhaarNumber.length !== 12) {
        return alert('Aadhaar must be exactly 12 digits (without spaces)');
      }
      if (!/^\d+$/.test(aadhaarNumber)) {
        return alert('Aadhaar must contain only digits');
      }
      
      try {
        document.getElementById('sendOtpBtn').disabled = true;
        const payload = {
          loginId: loginId,
          aadhaarLinkedPhone: aadhaarLinkedPhone,
          aadhaarNumber: aadhaarNumber,
          email: ownerEmail
        };
        console.log('Sending OTP request:', payload);
        const data = await postWithFallback('/api/checkin/owner/kyc/send-otp', payload);
        if (!data.success) {
          document.getElementById('otpMsg').innerHTML = `<span class="error">Error: ${data.message || 'OTP send failed'}</span>`;
          document.getElementById('sendOtpBtn').disabled = false;
          return;
        }
        document.getElementById('otpMsg').innerHTML = `<span class="success">✓ OTP sent to your registered email. Check your inbox for a 4-digit code.</span>`;
      } catch (err) {
        console.error('OTP send error:', err);
        document.getElementById('otpMsg').innerHTML = `<span class="error">Error: ${err.message}</span>`;
        document.getElementById('sendOtpBtn').disabled = false;
      }
    };

    document.getElementById('verifyOtpBtn').onclick = async () => {
      const loginId = document.getElementById('loginId').value.trim();
      const aadhaarNumber = document.getElementById('aadhaarNumber').value.trim().replace(/\s/g, '');
      const otp = document.getElementById('otp').value.trim();
      
      if (!loginId) {
        return alert('Login ID is missing');
      }
      if (!aadhaarNumber || aadhaarNumber.length !== 12) {
        return alert('Please enter a valid Aadhaar number (12 digits)');
      }
      if (!otp || otp.length !== 4) {
        return alert('Please enter a valid 4-digit OTP');
      }
      
      try {
        document.getElementById('verifyOtpBtn').disabled = true;
        const payload = {
          loginId: loginId,
          aadhaarNumber: aadhaarNumber,
          otp: otp
        };
        console.log('Verifying OTP with payload:', payload);
        const data = await postWithFallback('/api/checkin/owner/kyc/verify-otp', payload);
        if (!data.success) {
          document.getElementById('otpMsg').innerHTML = `<span class="error">Error: ${data.message || 'OTP verification failed'}</span>`;
          document.getElementById('verifyOtpBtn').disabled = false;
          return;
        }
        document.getElementById('otpMsg').innerHTML = `<span class="success">✓ OTP verified successfully! Your login credentials have been sent to your email.</span>`;
        document.getElementById('nextBtn').style.display = 'inline-block';
      } catch (err) {
        console.error('OTP verify error:', err);
        document.getElementById('otpMsg').innerHTML = `<span class="error">Error: ${err.message}</span>`;
        document.getElementById('verifyOtpBtn').disabled = false;
      }
    };

    document.getElementById('nextBtn').onclick = () => {
      const loginId = document.getElementById('loginId').value.trim();
      const emailPart = ownerEmail ? `&email=${encodeURIComponent(ownerEmail)}` : '';
      location.href = `ownerterms.html?loginId=${encodeURIComponent(loginId)}${emailPart}`;
    };
  </script>
</body>
</html>
