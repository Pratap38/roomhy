<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenant Rental Agreement & E-sign</title>
  <link rel="stylesheet" href="assets/css/tenantagreement.css">
</head>
<body>
  <div class="wrap">
    <h2>Tenant Rental Agreement</h2>
    <div class="box">
      <p>This digital e-sign confirms the tenant accepts RoomHy rental terms, monthly rent obligations, property rules, and legal compliance requirements.</p>
      <p>By signing, tenant confirms information submitted in profile and KYC is accurate.</p>
    </div>

    <label>Login ID</label>
    <input id="loginId" required>

    <label>E-sign Full Name</label>
    <input id="eSignName" required>

    <label><input type="checkbox" id="accepted" style="width:auto;"> I accept the rental agreement and provide my e-sign consent.</label>

    <button id="submitBtn">Final Submit</button>
  </div>

  <script src="assets/js/tenantagreement.js"></script>
</body>
</html>
